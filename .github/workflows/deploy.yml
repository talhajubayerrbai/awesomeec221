name: Deploy

on:
  workflow_dispatch:

jobs:
  # 
  # JOB: test
  # 
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (advisory only)
        run: |
          pip install flake8 || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true
        continue-on-error: true

      - name: Run tests
        run: |
          pip install pytest || true
          pytest --tb=short -q || true
        continue-on-error: true

  # 
  # JOB: provision
  # 
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}
      ssm_bucket: ${{ steps.tf_outputs.outputs.ssm_bucket }}
      alb_dns: ${{ steps.tf_outputs.outputs.alb_dns }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          SSM_BUCKET=$(terraform output -raw ssm_bucket_name)
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "ssm_bucket=${SSM_BUCKET}"   >> "$GITHUB_OUTPUT"
          echo "alb_dns=${ALB_DNS}"         >> "$GITHUB_OUTPUT"

  # 
  # JOB: configure
  # 
  configure:
    name: Configure Application
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible and AWS SSM dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws community.aws

      - name: Install SSM Session Manager plugin
        run: |
          curl --silent --location \
            "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSM agent to be ready
        env:
          INSTANCE_ID: ${{ needs.provision.outputs.instance_id }}
        run: |
          echo "Waiting for SSM agent on ${INSTANCE_ID}..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "  Attempt ${i}: SSM status = ${STATUS}"
            if [ "${STATUS}" = "Online" ]; then
              echo "SSM agent is online."
              break
            fi
            sleep 20
          done

      - name: Build SSM bucket name (no secret interpolation)
        id: bucket_name
        env:
          SSM_BUCKET_FROM_TF: ${{ needs.provision.outputs.ssm_bucket }}
        run: |
          # Use the bucket name captured from Terraform output directly
          echo "ssm_bucket=${SSM_BUCKET_FROM_TF}" >> "$GITHUB_OUTPUT"

      - name: Run Ansible playbook via SSM
        env:
          INSTANCE_ID: ${{ needs.provision.outputs.instance_id }}
          SSM_BUCKET: ${{ steps.bucket_name.outputs.ssm_bucket }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook ansible/playbook.yml \
            -i "${INSTANCE_ID}," \
            -e "ansible_aws_ssm_bucket_name=${SSM_BUCKET}" \
            -e "ansible_aws_ssm_region=${AWS_REGION}"

  # 
  # JOB: verify
  # 
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB DNS from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=${ALB_DNS}" >> "$GITHUB_OUTPUT"

      - name: Wait for ALB and app to be ready
        run: |
          echo "Waiting up to 5 minutes for the app to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" \
              "http://${{ steps.get_url.outputs.alb_dns }}/health/" 2>/dev/null || echo "000")
            echo "  Attempt ${i}: HTTP ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "App is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: App did not become healthy in time."
          exit 1

      - name: Smoke test root endpoint
        run: |-
          STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" \
            "http://${{ steps.get_url.outputs.alb_dns }}/" 2>/dev/null || echo "000")
          echo "Root endpoint HTTP status: ${STATUS}"
          if [[ "${STATUS}" =~ ^[23] ]]; then
            echo "Smoke test passed."
          else
            echo "ERROR: Root endpoint returned ${STATUS}."
            exit 1
          fi
